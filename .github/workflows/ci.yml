name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: pnpm test --run
        env:
          # Provide dummy env vars so tests can run without real secrets
          DATABASE_URL: "mysql://test:test@localhost:3306/test"
          JWT_SECRET: "ci-test-secret-at-least-32-chars-long"
          RESEND_API_KEY: "re_test_dummy_key_for_ci"
          BUILT_IN_FORGE_API_URL: "https://forge.manus.ai"
          BUILT_IN_FORGE_API_KEY: "dummy"
          R2_ACCOUNT_ID: "dummy"
          R2_ACCESS_KEY_ID: "dummy"
          R2_SECRET_ACCESS_KEY: "dummy"
          R2_BUCKET_NAME: "dummy"

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build client
        run: pnpm --filter client build
        env:
          VITE_APP_ID: "ci-dummy"
          VITE_OAUTH_PORTAL_URL: "https://dummy.manus.im"
          VITE_FRONTEND_FORGE_API_KEY: "dummy"
          VITE_FRONTEND_FORGE_API_URL: "https://dummy.manus.ai"
